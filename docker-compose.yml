version: '3.9'

# ═══════════════════════════════════════════════════════════════
#  VaksinKu — Docker Compose
#  Usage:
#    Dev:  docker compose --profile dev up -d
#    Prod: docker compose up -d
# ═══════════════════════════════════════════════════════════════

services:

  # ──────────────────────────────────────────────────────────────
  # PHP-FPM Application
  # ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        - BUILD_ENV=${APP_ENV:-production}
    image: vaksinku-app:${APP_VERSION:-latest}
    container_name: vaksinku_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    networks:
      - vaksinku_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────────
  # Nginx Web Server
  # ──────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vaksinku_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - vaksinku_net
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────────
  # MySQL 8.0
  # ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: vaksinku_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-vaksinku}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_USER: ${DB_USERNAME:-vaksinku_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    networks:
      - vaksinku_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${DB_USERNAME:-vaksinku_user}",
             "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────────
  # Redis (Cache + Queue + Session)
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vaksinku_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    networks:
      - vaksinku_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Laravel Queue Worker
  # ──────────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vaksinku_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --memory=256
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_CONNECTION: redis
    volumes:
      - .:/var/www/html
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    networks:
      - vaksinku_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────
  # Laravel Scheduler (artisan schedule:run tiap 60 detik)
  # ──────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vaksinku_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction >> /var/www/html/storage/logs/scheduler.log 2>&1;
        sleep 60;
      done"
    volumes:
      - .:/var/www/html
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    networks:
      - vaksinku_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────
  # Mailpit (Dev Email Catcher) — hanya aktif di profile dev
  # ──────────────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: vaksinku_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - vaksinku_net
    profiles:
      - dev

  # ──────────────────────────────────────────────────────────────
  # phpMyAdmin (Dev DB UI) — hanya aktif di profile dev
  # ──────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: vaksinku_pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 50M
    networks:
      - vaksinku_net
    depends_on:
      - mysql
    profiles:
      - dev

# ═══════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════
volumes:
  mysql_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./docker/volumes/mysql
  redis_data:
    driver: local
  app_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./storage
  app_logs:
    driver: local
  nginx_logs:
    driver: local

# ═══════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════
networks:
  vaksinku_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
